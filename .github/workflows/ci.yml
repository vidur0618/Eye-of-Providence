name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm data:audit:epoch -- --as-of 2026-07-21
      - run: pnpm data:derive:epoch -- --as-of 2026-07-21
      - run: pnpm model:calibration-readiness -- --as-of 2026-07-21 --check
      - run: pnpm release:audit -- --as-of 2026-07-21
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
